services:
  - type: web
    name: ledger-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: ledger-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: API_JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

databases:
  - name: ledger-db
    databaseName: ledger
    user: ledger
    plan: starter
